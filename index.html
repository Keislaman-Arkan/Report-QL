        try {

function getSuratByJuz(juz) { return quranData[juz] || []; }
function getAyatCount(juz, surat) { const s = getSuratByJuz(juz).find(x => x.name === surat); return s ? s.ayat : 0; }

// --- MEMBANGUN URUTAN PROGRESS HAFALAN (SDIT STANDARD) ---
let hafalanProgressPath = [];
for (let j = 30; j >= 1; j--) {
   if (quranData[j]) {
      [...quranData[j]].reverse().forEach(s => {
         if (!hafalanProgressPath.includes(s.name)) {
            hafalanProgressPath.push(s.name);
         }
      });
   }
}

// --- Database Helpers ---
function getStudents() { return allData.filter(d => d.type === 'student'); }
function getTeachers() { return allData.filter(d => d.type === 'teacher'); }
function getReports() { return allData.filter(d => d.type === 'report'); }
function getUsers() { return allData.filter(d => d.type === 'user'); }

function getLatestStudentStatus(reportsList) {
  const latest = {};
  const sortedReports = [...reportsList].sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
  sortedReports.forEach(r => {
    latest[r.student_id] = r;
  });
  return Object.values(latest);
}

// --- LOGIC PENILAIAN "TUNTAS" TARGET ---
function getBacaanScore(type, jilid, hal) {
  if (type === 'quran') return 999999;
  return (parseInt(jilid) || 1) * 1000 + (parseInt(hal) || 1);
}

function getJuzRank(j) {
  if(j===30) return 1; if(j===29) return 2; if(j===28) return 3;
  if(j===27) return 4; if(j===26) return 5; return j + 5; 
}

function getHafalanScore(juz, surat, ayat) {
   const suratIndex = hafalanProgressPath.indexOf(surat);
   if (suratIndex === -1) return 0;
   return (suratIndex * 1000) + (parseInt(ayat) || 1);
}

function calculateTuntasMetrics(studentsList, reportsList) {
  let tuntasBacaan = 0; let tuntasHafalan = 0;
  let evaluatedBacaan = 0; let evaluatedHafalan = 0;

  studentsList.forEach(student => {
    const grade = student.grade;
    const stReports = reportsList.filter(r => r.student_id === student.__backendId);
    
    const bacaanReports = stReports.filter(r => r.report_type === 'iqro' || r.report_type === 'quran').sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
    const hafalanReports = stReports.filter(r => r.report_type === 'hafalan').sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

    const tIqro = allData.find(x => x.type === 'setting' && x.subject === `iqro_target_${grade}`)?.data || {target_iqro_jilid:1, target_iqro_halaman:120};
    const tHafalan = allData.find(x => x.type === 'setting' && x.subject === `hafalan_target_${grade}`)?.data || {target_hafalan_juz:30, target_surat_awal:'', target_ayat_akhir:1};

    const targetBacaanScore = getBacaanScore('iqro', tIqro.target_iqro_jilid, tIqro.target_iqro_halaman);
    const targetHafalanScore = getHafalanScore(tHafalan.target_hafalan_juz, tHafalan.target_surat_awal, tHafalan.target_ayat_akhir);

    if (bacaanReports.length > 0) {
       evaluatedBacaan++;
       const latest = bacaanReports[0];
       if (getBacaanScore(latest.report_type, latest.iqro_jilid, latest.iqro_halaman) >= targetBacaanScore) tuntasBacaan++;
    }
    if (hafalanReports.length > 0) {
       evaluatedHafalan++;
       const latest = hafalanReports[0];
       if (getHafalanScore(latest.juz, latest.surat, latest.ayat_sampai) >= targetHafalanScore) tuntasHafalan++;
    }
  });

  return { tuntasBacaan, tuntasHafalan, evaluatedBacaan, evaluatedHafalan };
}

function showToast(msg, type='success') {
  const colors = { success: 'bg-emerald-500', error: 'bg-red-500', warning: 'bg-amber-500' };
  const div = document.createElement('div');
  div.className = `toast fixed top-4 right-4 ${colors[type]} text-white px-5 py-3 rounded-lg shadow-lg z-50 font-medium`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

        <button onclick="handleLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition">Masuk</button>
        <button onclick="loginAsVisitor()" class="w-full mt-3 border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-2.5 rounded-lg transition">Masuk sebagai Pengunjung</button>
        <p id="login-error" class="text-red-500 text-sm mt-3 hidden"></p>
      </div>
    </div>
  </div>`;
}

function handleLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) { showLoginError('Harap isi semua field'); return; }
  
  const allAccounts = allData.filter(d => d.type === 'user' || d.type === 'teacher');
  const found = allAccounts.find(u => (u.name === user || u.email === user) && u.password === pass);
  
  if (found) { currentUser = { name: found.name, role: found.role, id: found.__backendId }; saveSession(); render(); return; }
  if (user === 'admin' && pass === 'admin123') { currentUser = { name: 'Admin', role: 'admin', id: 'default' }; saveSession(); render(); return; }
  showLoginError('Username atau password salah');
}

function loginAsVisitor() { currentUser = { name: 'Pengunjung', role: 'visitor', id: 'visitor' }; saveSession(); render(); }
function showLoginError(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.classList.remove('hidden'); }
function handleLogout() { clearSession(); currentPage = 'dashboard'; render(); }

// ============ MAIN LAYOUT & SIDEBAR ============
function toggleSidebar() {
  isSidebarOpen = !isSidebarOpen;
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  if (isSidebarOpen) {
    sidebar.classList.remove('-translate-x-full');
    backdrop.classList.remove('hidden');
  } else {
    sidebar.classList.add('-translate-x-full');
    backdrop.classList.add('hidden');
  }
}

function updateSidebarActiveState() {
  document.querySelectorAll('.sidebar-item').forEach(el => {
    if (el.dataset.page === currentPage) {
      el.classList.add('active', 'text-white');
      el.classList.remove('text-emerald-100', 'border-transparent');
      el.style.borderLeftColor = '#34d399';
    } else {
      el.classList.remove('active', 'text-white');
      el.classList.add('text-emerald-100');
      el.style.borderLeftColor = 'transparent';
    }
  });
}

function navigate(page) { 
  currentPage = page; 
  if (window.innerWidth < 768 && isSidebarOpen) toggleSidebar();
  renderPage(); 
}

function renderPage() {
  const main = document.getElementById('main-content');
  if (!main) return;
  
  const adminPages = ['settings', 'user-management', 'guru-account'];
  if (adminPages.includes(currentPage) && currentUser.role !== 'admin') {
    currentPage = 'dashboard'; 
  }

  window.scrollTo(0,0);
  updateSidebarActiveState();

  switch(currentPage) {
    case 'dashboard': renderDashboard(main); break;
    case 'students': renderStudents(main); break;
    case 'teachers': renderTeachers(main); break;
    case 'report-bacaan': renderReportBacaan(main); break;
    case 'report-hafalan': renderReportHafalan(main); break;
    case 'reports': renderReports(main); break;
    case 'statistics': renderStatistics(main); break;
    case 'settings': renderSettings(main); break;
    case 'user-management': renderUserManagement(main); break;
    case 'guru-account': renderGuruAccount(main); break;
    default: renderDashboard(main);
  }
  if(window.lucide) lucide.createIcons();
}

function handleGradeChangeForm() {
  updateKelasOptionsForm();
  const grade = document.getElementById('s-grade').value;
  if (!grade) return;
  
  const iqroSetting = allData.find(x => x.type === 'setting' && x.subject === 'iqro_target_' + grade);
  const hafalanSetting = allData.find(x => x.type === 'setting' && x.subject === 'hafalan_target_' + grade);
  
  if (iqroSetting && iqroSetting.data) {
    document.getElementById('s-jilid').value = iqroSetting.data.target_iqro_jilid || 1;
    document.getElementById('s-hal').value = iqroSetting.data.target_iqro_halaman || 120;
  }
  
  if (hafalanSetting && hafalanSetting.data) {
    const hData = hafalanSetting.data;
    document.getElementById('hafal-surat').checked = true;
    document.getElementById('hafal-juz').checked = false; 
    updateHafalanMode();
    
    document.getElementById('s-hafal-juz').value = hData.target_hafalan_juz || 30;
    updateHafalanSuratDropdown(); 
    
    setTimeout(() => {
      if (hData.target_surat_awal) {
        const suratEl = document.getElementById('s-hafal-surat');
        if (suratEl) suratEl.value = hData.target_surat_awal;
        updateHafalanAyatMax(); 
      }
      const dariEl = document.getElementById('s-hafal-ayat-dari');
      const sampaiEl = document.getElementById('s-hafal-ayat-sampai');
      if (dariEl) dariEl.value = hData.target_ayat_awal || 1;
      if (sampaiEl) sampaiEl.value = hData.target_ayat_akhir || 1;
    }, 100);
  }
}

function updateKelasOptionsForm(selectedKelasVal = "") {
  const grade = document.getElementById('s-grade').value;
  const sel = document.getElementById('s-kelas');
  
  if (!grade) {
    sel.innerHTML = '<option value="">Pilih Tingkat Terlebih Dahulu</option>';
    sel.classList.add('bg-slate-50');
    return;
  }
  
  const map = getGradeKelasMap();
  const classes = map[grade] || [];
  
  sel.classList.remove('bg-slate-50');
  sel.classList.add('bg-white');
  
  if(classes.length === 0) {
    sel.innerHTML = '<option value="">(Belum ada kelas di tingkat ini)</option>';
  } else {
    sel.innerHTML = `<option value="">-- Pilih Kelas --</option>` + classes.map(k => `<option value="${k}" ${k===selectedKelasVal?'selected':''}>${k}</option>`).join('');
  }
}

function updateHafalanMode() {
  const juzMode = document.getElementById('hafal-juz').checked;
  const hafalJuzMode = document.getElementById('hafal-juz-mode');
  const hafalSuratMode = document.getElementById('hafal-surat-mode');
  if (hafalJuzMode) hafalJuzMode.classList.toggle('hidden', !juzMode);
  if (hafalSuratMode) hafalSuratMode.classList.toggle('hidden', juzMode);
}

function updateHafalanSuratDropdown() {
  const juzEl = document.getElementById('s-hafal-juz');
  const suratEl = document.getElementById('s-hafal-surat');
  if (!juzEl || !suratEl) return;
  const juz = parseInt(juzEl.value);
  const surats = getSuratByJuz(juz);
  suratEl.innerHTML = surats.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  updateHafalanAyatMax();
}

function updateHafalanAyatMax() {
  const juzEl = document.getElementById('s-hafal-juz');
  const suratEl = document.getElementById('s-hafal-surat');
  const sampaiEl = document.getElementById('s-hafal-ayat-sampai');
  const dariEl = document.getElementById('s-hafal-ayat-dari');
  if (!juzEl || !suratEl || !sampaiEl || !dariEl) return;
  
  const juz = parseInt(juzEl.value);
  const surat = suratEl.value;
  const max = getAyatCount(juz, surat);
  sampaiEl.max = max;
  dariEl.max = max;
  if(parseInt(sampaiEl.value) > max) sampaiEl.value = max;
}

function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); document.getElementById('student-modal').innerHTML = ''; }

async function saveStudent() {
  const name = document.getElementById('s-name').value.trim();
  const grade = document.getElementById('s-grade').value;
  const kelas = document.getElementById('s-kelas').value;
  if (!name || !grade || !kelas) { showToast('Isi nama, grade, dan kelas', 'error'); return; }
  
  let hafalanData = {};

      target_hafalan_surat: document.getElementById('s-hafal-surat').value,

      target_hafalan_ayat_sampai: parseInt(document.getElementById('s-hafal-ayat-sampai').value)
    };

  const r = await window.dataSdk.create({

async function updateStudent(id) {
  const s = allData.find(d => d.__backendId === id);
  if (!s) return;
  s.name = document.getElementById('s-name').value.trim();
  s.grade = document.getElementById('s-grade').value;
  s.kelas = document.getElementById('s-kelas').value;
  s.iqro_jilid = parseInt(document.getElementById('s-jilid').value);
  s.iqro_halaman = parseInt(document.getElementById('s-hal').value);
  
  if (document.getElementById('hafal-juz').checked) {
    s.target_juz = parseInt(document.getElementById('s-target-juz').value);
    s.target_hafalan_surat = '';
    s.target_hafalan_ayat_dari = 0;
    s.target_hafalan_ayat_sampai = 0;
  } else {
    s.target_juz = 0;
    s.target_hafalan_surat = document.getElementById('s-hafal-surat').value;
    s.target_hafalan_ayat_dari = parseInt(document.getElementById('s-hafal-ayat-dari').value);
    s.target_hafalan_ayat_sampai = parseInt(document.getElementById('s-hafal-ayat-sampai').value);
  }
  
  const r = await window.dataSdk.update(s);
  if (r.isOk) { showToast('Data siswa diperbarui'); closeStudentModal(); }
  else showToast('Gagal update','error');
}

function updateSettingSuratAyat(idx) {
  const juz = parseInt(document.getElementById(`set-haf-juz-${idx}`).value);
  const surats = getSuratByJuz(juz);
  const sel = document.getElementById(`set-haf-surat-${idx}`);
  sel.innerHTML = surats.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  updateSettingAyatMax(idx);
}

function updateSettingAyatMax(idx) {
  const juz = parseInt(document.getElementById(`set-haf-juz-${idx}`).value);
  const surat = document.getElementById(`set-haf-surat-${idx}`).value;
  const max = getAyatCount(juz, surat);
  const m1 = document.getElementById(`set-haf-ayat-sampai-${idx}`);
  const m2 = document.getElementById(`set-haf-ayat-dari-${idx}`);
  if(m1) m1.max = max; 
  if(m2) m2.max = max;
  if (m1 && parseInt(m1.value) > max) m1.value = max;
}

async function saveSettingsIqro() {
  const grades = Object.keys(getGradeKelasMap());
  if (allData.length >= 999) { showToast('Batas data tercapai','warning'); return; }
  
  let operations = [];
  for (let i = 0; i < grades.length; i++) {
    const gradeName = grades[i];
    const subjectName = `iqro_target_${gradeName}`;
    const existing = allData.find(x => x.type === 'setting' && x.subject === subjectName);
    
    const targetData = {
      target_iqro_jilid: parseInt(document.getElementById(`set-iqro-jilid-${i}`).value) || 1,
      target_iqro_halaman: parseInt(document.getElementById(`set-iqro-hal-${i}`).value) || 120
    };
    
    if (existing) {
      existing.data = targetData;
      operations.push(window.dataSdk.update(existing, true));
    } else {
      operations.push(window.dataSdk.create({ type: 'setting', subject: subjectName, data: targetData, name:'',email:'',password:'',role:'',kelas:0,target_juz:0,iqro_jilid:0,iqro_halaman:0,juz:0,surat:'',ayat_dari:0,ayat_sampai:0,status:'',tanggal:'',student_id:'',report_type:'',nip:'',phone:'',address:'',specialization:'',setting_kelas:0,target_iqro_jilid:0,target_iqro_halaman:0,target_hafalan_juz:0,target_surat_awal:'',target_surat_akhir:'',target_ayat_awal:0,target_ayat_akhir:0,standar_ketuntasan:0 }, true));
    }
  }
  await Promise.all(operations);
  await window.dataSdk.fetchAll();
  showToast("Target Iqro' per tingkat berhasil disimpan");
}

async function addKelasNameDynamic(gradeName) {
  const inputEl = document.getElementById('k-name');
  const className = inputEl.value.trim();
  if (!className) { showToast('Nama kelas harus diisi', 'error'); return; }
  
  const map = getGradeKelasMap();
  if (!map[gradeName]) map[gradeName] = [];
  
  if (map[gradeName].includes(className)) { 
    showToast(`Kelas ${className} sudah ada di ${gradeName}`, 'warning'); 
    return; 
  }
  
  map[gradeName].push(className);
  await saveGradeKelasMap(map);
  
  showToast(`Kelas ${className} berhasil ditambahkan`);
  closeKelasModal();
  renderPage();
}

async function deleteKelasDynamic(gradeName, className) {
  const map = getGradeKelasMap();
  if (map[gradeName]) {
    map[gradeName] = map[gradeName].filter(c => c !== className);
    await saveGradeKelasMap(map);
    showToast(`Kelas ${className} dihapus`);
    renderPage();
  }
}

function filterStudents(prefix, query) {
  const students = getStudents();
  const dropdown = document.getElementById(`dropdown-${prefix}-student`);
  const hiddenInput = document.getElementById(`${prefix}-student`);
  
  if (hiddenInput.dataset.name !== query) hiddenInput.value = ''; 

  if (!query) {
    renderDropdown(prefix, students.slice(0, 15)); 
    dropdown.classList.remove('hidden');
    return;
  }
  
  const filtered = students.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));
  renderDropdown(prefix, filtered.slice(0, 20)); 
  dropdown.classList.remove('hidden');
}

function renderDropdown(prefix, list) {
  const dropdown = document.getElementById(`dropdown-${prefix}-student`);
  if(list.length === 0) {
     dropdown.innerHTML = '<div class="p-4 text-sm text-slate-500 text-center italic">Siswa tidak ditemukan</div>';
     return;
  }
  dropdown.innerHTML = list.map(s => `
    <div class="p-3 hover:bg-emerald-50 cursor-pointer border-b border-slate-50 last:border-0 text-sm transition" 
         onmousedown="selectStudent('${prefix}', '${s.__backendId}', '${s.name.replace(/'/g, "\\'")}', '${s.kelas||s.grade||'-'}')">
      <div class="font-bold text-slate-800">${s.name}</div>
      <div class="text-xs text-slate-500 mt-0.5">Kelas: ${s.kelas||s.grade||'-'}</div>
    </div>`
  ).join('');
}

function selectStudent(prefix, id, name, kelas) {
  if (prefix === 'edit') {
    document.getElementById('dropdown-edit-student').classList.add('hidden');
    document.getElementById('search-edit-student').value = '';
    editStudent(id); 
    return;
  }
  
  const searchInput = document.getElementById(`search-${prefix}-student`);
  const hiddenInput = document.getElementById(`${prefix}-student`);
  
  const displayText = `${name} (${kelas})`;
  searchInput.value = displayText;
  hiddenInput.value = id;
  hiddenInput.dataset.name = displayText;
  
  document.getElementById(`dropdown-${prefix}-student`).classList.add('hidden');

  // TRIGGER AUTO-FILL
  autoFillReportForm(prefix, id);
}

function autoFillReportForm(prefix, studentId) {
  const reports = getReports();
  let reportType = '';
  if (prefix === 'ri') reportType = 'iqro';
  else if (prefix === 'rq') reportType = 'quran';
  else if (prefix === 'rh') reportType = 'hafalan';

  const stReports = reports.filter(r => r.student_id === studentId && r.report_type === reportType);
  stReports.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
  
  if (stReports.length > 0) {
    const latest = stReports[0];
    if (prefix === 'ri') {
      document.getElementById('ri-jilid').value = latest.iqro_jilid || 1;
      document.getElementById('ri-hal').value = latest.iqro_halaman || 1;
    } else if (prefix === 'rq') {
      document.getElementById('rq-juz').value = latest.juz || 1;
      updateQuranSuratDropdown(); 
      setTimeout(() => {
        const suratEl = document.getElementById('rq-surat');
        if (suratEl && latest.surat) suratEl.value = latest.surat;
        updateQuranAyatMax();
        const dariEl = document.getElementById('rq-ayat-dari');
        const sampaiEl = document.getElementById('rq-ayat-sampai');
        if (dariEl) dariEl.value = latest.ayat_sampai || 1; 
        if (sampaiEl) sampaiEl.value = latest.ayat_sampai || 1; 
      }, 50);
    } else if (prefix === 'rh') {
      document.getElementById('rh-juz').value = latest.juz || 30;
      updateSuratDropdownH();
      setTimeout(() => {
        const suratEl = document.getElementById('rh-surat');
        if (suratEl && latest.surat) suratEl.value = latest.surat;
        updateAyatMaxH();
        const dariEl = document.getElementById('rh-ayat-dari');
        const sampaiEl = document.getElementById('rh-ayat-sampai');
        if (dariEl) dariEl.value = latest.ayat_sampai || 1;
        if (sampaiEl) sampaiEl.value = latest.ayat_sampai || 1;
      }, 50);
    }
  } else {
    // Jika belum pernah ada laporan, ambil target utama dari profil anak sebagai acuan
    const student = getStudents().find(s => s.__backendId === studentId);
    if (student) {
       if (prefix === 'ri') {
         document.getElementById('ri-jilid').value = student.iqro_jilid || 1;
         document.getElementById('ri-hal').value = student.iqro_halaman || 1;
       } else if (prefix === 'rh') {
         if (student.target_juz && !student.target_hafalan_surat) {
           document.getElementById('rh-juz').value = student.target_juz;
           updateSuratDropdownH();
         } else if (student.target_hafalan_surat) {
           let foundJuz = 30;
           for (let j = 1; j <= 30; j++) {
             if (quranData[j] && quranData[j].find(x => x.name === student.target_hafalan_surat)) {
               foundJuz = j; break;
             }
           }
           document.getElementById('rh-juz').value = foundJuz;
           updateSuratDropdownH();
           setTimeout(() => {
             const sEl = document.getElementById('rh-surat');
             if(sEl) sEl.value = student.target_hafalan_surat;
             updateAyatMaxH();
             const dariEl = document.getElementById('rh-ayat-dari');
             const sampaiEl = document.getElementById('rh-ayat-sampai');
             if (dariEl) dariEl.value = student.target_hafalan_ayat_dari || 1;
             if (sampaiEl) sampaiEl.value = student.target_hafalan_ayat_sampai || 1;
           }, 50);
         }
       } else if (prefix === 'rq') {
         document.getElementById('rq-juz').value = 1;
         updateQuranSuratDropdown();
         setTimeout(() => {
            const dariEl = document.getElementById('rq-ayat-dari');
            const sampaiEl = document.getElementById('rq-ayat-sampai');
            if(dariEl) dariEl.value = 1;
            if(sampaiEl) sampaiEl.value = 1;
         }, 50);
       }
    }
  }
}

}

// ============ STATISTICS ============
let statsPeriod = 'semua';

function getReportsByPeriod(period) {
  const reports = getReports();
  const now = new Date();
  if (period === 'semua') return reports;
  if (period === 'harian') return reports.filter(r => r.tanggal === today());
  if (period === 'mingguan') {
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    return reports.filter(r => { const d = new Date(r.tanggal); return d >= weekStart && d <= weekEnd; });
  }
  if (period === 'bulanan') return reports.filter(r => new Date(r.tanggal).getMonth() === now.getMonth() && new Date(r.tanggal).getFullYear() === now.getFullYear());
  if (period === 'tahunan') return reports.filter(r => new Date(r.tanggal).getFullYear() === now.getFullYear());
  return reports;
}

function getPeriodLabel() {
  const todayDate = new Date();
  if (statsPeriod === 'semua') return 'Semua Data';
  if (statsPeriod === 'harian') return `Harian - ${todayDate.toLocaleDateString('id-ID')}`;
  if (statsPeriod === 'mingguan') return `Mingguan - ${todayDate.toLocaleDateString('id-ID')}`;
  if (statsPeriod === 'bulanan') return `Bulan ${todayDate.toLocaleString('id-ID', {month:'long', year:'numeric'})}`;
  if (statsPeriod === 'tahunan') return `Tahun ${todayDate.getFullYear()}`;
  return '';
}

async function saveUser() {
  const name = document.getElementById('u-name').value.trim();
  const pass = document.getElementById('u-pass').value;

  else showToast('Gagal menambahkan','error');
}

async function deleteUser(id) {
  const item = allData.find(d=>d.__backendId===id);
  if(item){await window.dataSdk.delete(item);showToast('Akses pengguna dicabut'); renderPage();}
}

      <div class="space-y-4">
        <div><label class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap Guru</label><input id="ga-name" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm" placeholder="Sesuai dengan nama asli"></div>
        <div><label class="block text-sm font-semibold text-slate-700 mb-1.5">Sandi (Password) Login</label><input id="ga-password" type="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm" placeholder="Buatkan sandi sementara"></div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="closeGuruAccountModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-sm font-semibold transition">Batal</button>
        <button onclick="saveGuruAccount()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-sm font-semibold shadow-md shadow-emerald-200 transition">Buat Akun</button>
      </div>
    </div>
  </div>`;
  if(window.lucide) lucide.createIcons();
}

function closeGuruAccountModal() { document.getElementById('guru-account-modal').classList.add('hidden'); }

async function saveGuruAccount() {
  const name = document.getElementById('ga-name').value.trim();
  const password = document.getElementById('ga-password').value;
  if (!name || !password) { showToast('Nama dan sandi wajib diisi', 'error'); return; }
  if (allData.length >= 999) { showToast('Batas data tercapai', 'warning'); return; }
  
  const r = await window.dataSdk.create({
    type: 'teacher',
    name,
    email: name.toLowerCase().replace(/\s+/g, ''),
    password,
    nip: '', phone: '', specialization: '', address: '', role: 'guru',
    kelas: 0, target_juz: 0, iqro_jilid: 0, iqro_halaman: 0, juz: 0, surat: '', ayat_dari: 0, ayat_sampai: 0, status: '', tanggal: '', student_id: '', report_type: '', subject: '', target_iqro_jilid: 0, target_iqro_halaman: 0, target_hafalan_juz: 0, target_surat_awal: '', target_surat_akhir: '', target_ayat_awal: 0, target_ayat_akhir: 0, standar_ketuntasan: 0, setting_kelas: 0
  });
  
  if (r.isOk) { showToast('Akun guru berhasil dibuat. Username otomatis menyesuaikan nama.'); closeGuruAccountModal(); renderPage(); } 
  else showToast('Gagal membuat akun', 'error');
}

function editGuruAccount(id) {
  const guru = allData.find(d => d.__backendId === id);
  if (!guru) return;
  
  const modal = document.getElementById('guru-account-modal');
  modal.classList.remove('hidden');
  modal.innerHTML = `
  <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl fade-in">
      <h3 class="font-bold text-lg text-slate-800 mb-5">Edit Identitas Guru</h3>
      <div class="space-y-4">
        <div><label class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap</label><input id="ga-name" value="${guru.name}" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm"></div>
        <div><label class="block text-sm font-semibold text-slate-700 mb-1.5">Ubah Sandi</label><input id="ga-password" type="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm" placeholder="(Kosongkan jika tidak ingin diubah)"></div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="closeGuruAccountModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-sm font-semibold transition">Batal</button>
        <button onclick="updateGuruAccount('${id}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-sm font-semibold shadow-md shadow-emerald-200 transition">Simpan Perubahan</button>
      </div>
    </div>
  </div>`;
}

async function updateGuruAccount(id) {
  const guru = allData.find(d => d.__backendId === id);
  if (!guru) return;
  
  const name = document.getElementById('ga-name').value.trim();
  const password = document.getElementById('ga-password').value;
  if (!name) { showToast('Nama wajib diisi', 'error'); return; }
  
  guru.name = name;
  if (password) guru.password = password;
  
  const r = await window.dataSdk.update(guru);
  if (r.isOk) { showToast('Data guru berhasil diperbarui'); closeGuruAccountModal(); renderPage(); } 
  else showToast('Gagal menyimpan perubahan', 'error');
}

async function resetGuruPassword(id) {
  const guru = allData.find(d => d.__backendId === id);
  if (!guru) return;
  
  const modal = document.getElementById('guru-account-modal');
  modal.classList.remove('hidden');
  modal.innerHTML = `
  <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl fade-in">
      <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mb-4"><i data-lucide="key" class="w-6 h-6 text-amber-600"></i></div>
      <h3 class="font-bold text-lg text-slate-800 mb-1">Reset Password Paksa</h3>
      <p class="text-sm text-slate-500 mb-5">Anda akan mereset sandi login untuk guru <strong>${guru.name}</strong>.</p>
      
      <div class="space-y-4">
        <div><label class="block text-sm font-semibold text-slate-700 mb-1.5">Sandi Baru</label><input id="ga-new-password" type="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm" placeholder="Ketikkan sandi baru"></div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="closeGuruAccountModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-sm font-semibold transition">Batal</button>
        <button onclick="confirmResetPassword('${id}')" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-2.5 rounded-xl text-sm font-semibold shadow-md shadow-amber-200 transition">Ganti Sandi</button>
      </div>
    </div>
  </div>`;
  if(window.lucide) lucide.createIcons();
}

async function confirmResetPassword(id) {
  const guru = allData.find(d => d.__backendId === id);
  if (!guru) return;
  
  const newPassword = document.getElementById('ga-new-password').value;
  if (!newPassword) { showToast('Mohon masukkan sandi baru', 'error'); return; }
  
  guru.password = newPassword;
  const r = await window.dataSdk.update(guru);
  if (r.isOk) { showToast(`Sandi untuk ${guru.name} berhasil direset`); closeGuruAccountModal(); renderPage(); } 
  else showToast('Gagal mereset sandi', 'error');
}

let pendingDeleteGuruId = null;
function confirmDeleteGuruAccount(id) {
  pendingDeleteGuruId = id;
  const guru = allData.find(d => d.__backendId === id);
  if (!guru) return;
  
  const modal = document.getElementById('guru-account-modal');
  modal.classList.remove('hidden');
  modal.innerHTML = `
  <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center fade-in">
      <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="user-x" class="w-8 h-8 text-red-500"></i></div>
      <h3 class="font-bold text-xl text-slate-800 mb-2">Hapus Akun Guru?</h3>
      <p class="text-sm text-slate-500 mb-1">Aksi ini akan menghapus permanen akses login atas nama:</p>
      <p class="font-bold text-slate-700 text-lg mb-6">${guru.name}</p>
      <div class="flex gap-3">
        <button onclick="closeGuruAccountModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl text-sm font-semibold transition">Kembali</button>
        <button onclick="doDeleteGuruAccount()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl text-sm font-semibold shadow-md shadow-red-200 transition">Ya, Hapus</button>
      </div>
    </div>
  </div>`;
  if(window.lucide) lucide.createIcons();
}

async function doDeleteGuruAccount() {
  const guru = allData.find(d => d.__backendId === pendingDeleteGuruId);
  if (guru) {
    const r = await window.dataSdk.delete(guru);
    if (r.isOk) { showToast(`Akun guru ${guru.name} dihapus dari sistem`); renderPage(); }
    else showToast('Gagal menghapus', 'error');
  }
  closeGuruAccountModal();
}

// ============ INIT ============
const defaultConfig = { app_title: 'Report Qur\'an Learning', font_family: 'Plus Jakarta Sans' };
async function initApp() {
  window.elementSdk.init({ defaultConfig, onConfigChange: async (cfg) => { document.body.style.fontFamily = `${cfg.font_family || defaultConfig.font_family}, sans-serif`; } });
  await window.dataSdk.init({ onDataChanged(data) { allData = data; if (currentUser) renderPage(); if(window.lucide) lucide.createIcons(); } });
  loadSession(); render();
}
initApp();
  </script>
</body>
</html>
